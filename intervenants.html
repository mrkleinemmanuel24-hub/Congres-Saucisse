<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intervenants — Congres de la Saucisse 2026</title>
  <link rel="stylesheet" href="css/front.css">
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="navbar-brand"><span>🌭</span> Congres de la Saucisse</a>
  <button class="nav-toggle" onclick="document.querySelector('.navbar-links').classList.toggle('open')">☰</button>
  <div class="navbar-links">
    <a href="index.html">Accueil</a>
    <a href="programme.html">Programme</a>
    <a href="intervenants.html" class="active">Intervenants</a>
    <a href="plan.html">Plan</a>
    <a href="infos.html">Infos pratiques</a>
    <a href="presse.html">Presse</a>
    <a href="inscription.html" class="cta-nav">S'inscrire</a>
  </div>
</nav>

<section class="section">
  <h1 class="section-title">Nos intervenants</h1>
  <p class="section-subtitle">22 experts internationaux de la saucisse, de la gastronomie et de l'innovation alimentaire.</p>

  <div class="filters" id="theme-filters"></div>
  <div class="grid-3" id="speakers-grid"></div>
</section>

<!-- MODAL -->
<div class="modal-overlay" id="speaker-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div id="modal-content"></div>
  </div>
</div>

<footer class="footer">
  <div class="footer-brand">🌭 Le Congres de la Saucisse — Strasbourg 2026</div>
  <div class="footer-links">
    <a href="index.html">Accueil</a>
    <a href="programme.html">Programme</a>
    <a href="inscription.html">Inscription</a>
    <a href="plan.html">Plan</a>
    <a href="infos.html">Infos</a>
  </div>
</footer>

<script src="js/data.js"></script>
<script>
var currentFilter = null;

function initFilters() {
  var themes = [];
  CONGRES.SPEAKERS.forEach(function(s) {
    if (themes.indexOf(s.theme) === -1) themes.push(s.theme);
  });
  var html = '<button class="filter-btn active" onclick="filterBy(null)">Tous</button>';
  themes.forEach(function(t) {
    html += '<button class="filter-btn" data-t="' + t + '" onclick="filterBy(\'' + t + '\')">' + t + '</button>';
  });
  document.getElementById('theme-filters').innerHTML = html;
}

function filterBy(theme) {
  currentFilter = theme;
  document.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.classList.toggle('active', (!theme && !btn.dataset.t) || (theme && btn.dataset.t === theme));
  });
  renderSpeakers();
}

function renderSpeakers() {
  var speakers = CONGRES.SPEAKERS;
  if (currentFilter) speakers = speakers.filter(function(s) { return s.theme === currentFilter; });

  var html = '';
  speakers.forEach(function(s) {
    html += '<div class="speaker-card" id="speaker-' + s.id + '" onclick="openSpeaker(' + s.id + ')">' +
      '<div class="speaker-avatar">' + s.initiales + '</div>' +
      '<h3>' + s.prenom + ' ' + s.nom + '</h3>' +
      '<div class="title">' + s.titre + '</div>' +
      '<div class="org">' + s.org + '</div>' +
    '</div>';
  });
  document.getElementById('speakers-grid').innerHTML = html;
}

function openSpeaker(id) {
  var s = CONGRES.getSpeaker(id);
  if (!s) return;
  var sessions = CONGRES.getSessionsBySpeaker(id);
  var dayNames = ['', 'Jeu. 12 juin', 'Ven. 13 juin', 'Sam. 14 juin'];

  var html = '<div style="text-align:center;margin-bottom:20px;">' +
    '<div class="speaker-avatar" style="width:100px;height:100px;font-size:2.2rem;margin:0 auto 12px;">' + s.initiales + '</div>' +
    '<h2 style="font-size:1.3rem;">' + s.prenom + ' ' + s.nom + '</h2>' +
    '<div style="color:var(--gold);font-weight:600;font-size:.9rem;">' + s.titre + '</div>' +
    '<div style="color:var(--text-muted);font-size:.82rem;">' + s.org + '</div>' +
  '</div>' +
  '<div style="background:rgba(255,255,255,.03);border-radius:12px;padding:16px;margin-bottom:20px;">' +
    '<p style="font-size:.88rem;color:var(--text-dim);line-height:1.7;">' + s.bio + '</p>' +
  '</div>';

  if (sessions.length > 0) {
    html += '<h3 style="font-size:.95rem;color:var(--green);margin-bottom:12px;">Sessions (' + sessions.length + ')</h3>';
    sessions.forEach(function(sess) {
      var salle = CONGRES.getSalle(sess.salle);
      html += '<div style="display:flex;gap:12px;padding:10px;background:rgba(255,255,255,.02);border-radius:10px;margin-bottom:8px;">' +
        '<div style="min-width:60px;text-align:center;font-weight:700;color:var(--green);font-size:.85rem;">' + sess.debut + '</div>' +
        '<div>' +
          '<div style="font-weight:600;font-size:.88rem;">' + sess.titre + '</div>' +
          '<div style="font-size:.78rem;color:var(--text-muted);">' + dayNames[sess.jour] + ' · ' + (salle ? salle.nom : '') + '</div>' +
        '</div>' +
      '</div>';
    });
  }

  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('speaker-modal').classList.add('active');
}

function closeModal() {
  document.getElementById('speaker-modal').classList.remove('active');
}

document.getElementById('speaker-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

initFilters();
renderSpeakers();

// Auto-scroll to speaker if hash
if (location.hash) {
  var el = document.querySelector(location.hash);
  if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.click(); }
}
</script>
<script>window.COPYRIGHT = { owner: 'Congres de la Saucisse', year: 2026 };</script>
<script src="js/copyright-footer.js"></script>
</body>
</html>
