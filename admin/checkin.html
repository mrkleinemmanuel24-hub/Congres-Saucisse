<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check-in — Back Office</title>
  <link rel="stylesheet" href="../css/admin.css">
  <style>
    .scanner-area { text-align: center; margin: 32px auto; max-width: 500px; }
    .scanner-box { background: var(--bg-card); border: 2px dashed var(--border); border-radius: 20px; padding: 40px; margin-bottom: 20px; }
    .scanner-box .icon { font-size: 4rem; margin-bottom: 12px; }
    .scanner-box p { color: var(--text-dim); font-size: .88rem; }
    .manual-entry { margin-top: 20px; }
    .manual-entry input { width: 100%; padding: 14px 18px; border-radius: 12px; border: 1px solid var(--border); background: rgba(255,255,255,.04); color: var(--text); font-size: 1rem; text-align: center; font-weight: 700; letter-spacing: 1px; }
    .manual-entry input:focus { outline: none; border-color: var(--gold); }
    .checkin-result { text-align: center; padding: 40px; border-radius: 20px; margin: 20px auto; max-width: 500px; display: none; }
    .checkin-ok { background: rgba(34,197,94,.08); border: 2px solid var(--green); }
    .checkin-error { background: rgba(220,38,38,.08); border: 2px solid #DC2626; }
    .checkin-result .icon { font-size: 3rem; margin-bottom: 12px; }
    .checkin-result h2 { font-size: 1.2rem; margin-bottom: 8px; }
    .checkin-result p { font-size: .88rem; color: var(--text-dim); }
    .realtime-counters { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-top: 24px; }
    .counter-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: center; }
    .counter-card .counter-val { font-size: 1.8rem; font-weight: 900; color: var(--gold); }
    .counter-card .counter-label { font-size: .78rem; color: var(--text-dim); }
    .checkin-log { margin-top: 24px; }
    .log-entry { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: rgba(34,197,94,.03); border: 1px solid rgba(34,197,94,.1); border-radius: 10px; margin-bottom: 6px; font-size: .85rem; }
    .log-entry.error { background: rgba(220,38,38,.03); border-color: rgba(220,38,38,.1); }
    .log-entry .log-time { color: var(--text-muted); font-size: .78rem; min-width: 50px; }
    .log-entry .log-status { font-weight: 700; }
    .log-entry .log-status.ok { color: var(--green); }
    .log-entry .log-status.err { color: #DC2626; }
    #camera-video { width: 100%; max-width: 400px; border-radius: 12px; display: none; }
  </style>
</head>
<body>

<div class="login-overlay" id="login-overlay">
  <div class="login-box"><h1><img src="../img/icons/icon-saucisse.png" alt="Saucisse" style="width:48px;height:48px;border-radius:12px;object-fit:contain;vertical-align:middle" title="Back Office"> Back Office</h1><p>Entrez le mot de passe</p><input type="password" id="login-pwd" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')doLogin()"><button onclick="doLogin()">Connexion</button><div class="login-error" id="login-error">Mot de passe incorrect</div></div>
</div>

<header class="admin-header" id="admin-app" style="display:none;">
  <div class="admin-brand"><img src="../img/icons/icon-saucisse.png" alt="Saucisse" style="width:28px;height:28px;border-radius:6px;object-fit:contain;vertical-align:middle" title="Back Office"> Back Office</div>
  <nav class="admin-nav">
    <a href="index.html"><img src="../img/icons/icon-dashboard.png" alt="" style="width:20px;height:20px;border-radius:4px;object-fit:contain;vertical-align:middle" title="Dashboard"> Dashboard</a>
    <a href="participants.html"><img src="../img/icons/icon-participants.png" alt="" style="width:20px;height:20px;border-radius:4px;object-fit:contain;vertical-align:middle" title="Participants"> Participants</a>
    <a href="invitations.html"><img src="../img/icons/icon-invitations.png" alt="" style="width:20px;height:20px;border-radius:4px;object-fit:contain;vertical-align:middle" title="Invitations"> Invitations</a>
    <a href="traiteur.html"><img src="../img/icons/icon-traiteur.png" alt="" style="width:20px;height:20px;border-radius:4px;object-fit:contain;vertical-align:middle" title="Traiteur"> Traiteur</a>
    <a href="salles.html"><img src="../img/icons/icon-salles.png" alt="" style="width:20px;height:20px;border-radius:4px;object-fit:contain;vertical-align:middle" title="Salles"> Salles</a>
    <a href="checkin.html" class="active"><img src="../img/icons/icon-checkin.png" alt="" style="width:20px;height:20px;border-radius:4px;object-fit:contain;vertical-align:middle" title="Check-in"> Check-in</a>
    <a href="emails.html"><img src="../img/icons/icon-emails.png" alt="" style="width:20px;height:20px;border-radius:4px;object-fit:contain;vertical-align:middle" title="Emails"> Emails</a>
  </nav>
  <button class="admin-logout" onclick="logout()">Deconnexion</button>
</header>

<div class="admin-content" id="admin-content" style="display:none;">
  <h1 class="admin-title"><img src="../img/icons/icon-checkin.png" alt="Check-in" style="width:48px;height:48px;border-radius:12px;object-fit:contain;vertical-align:middle" title="Check-in Jour J"> Check-in Jour J</h1>

  <div class="scanner-area">
    <div class="scanner-box">
      <div class="icon"><img src="../img/icons/icon-qrcode.png" alt="Scanner QR" style="width:64px;height:64px;border-radius:12px;object-fit:contain" title="Scanner le QR code du badge"></div>
      <p>Scannez le QR code du badge participant</p>
      <video id="camera-video" autoplay playsinline></video>
      <button onclick="startCamera()" style="padding:10px 24px;border-radius:10px;background:var(--gold);color:#111;font-weight:700;border:none;cursor:pointer;margin-top:12px;">Activer la camera</button>
    </div>

    <div class="manual-entry">
      <p style="color:var(--text-dim);font-size:.82rem;margin-bottom:8px;">Ou saisie manuelle du code badge :</p>
      <input type="text" id="manual-code" placeholder="Ex: INS-001" onkeydown="if(event.key==='Enter')checkIn()">
      <button onclick="checkIn()" style="margin-top:10px;padding:10px 24px;border-radius:10px;background:var(--gold);color:#111;font-weight:700;border:none;cursor:pointer;width:100%;">Valider le check-in</button>
    </div>

    <!-- Result -->
    <div class="checkin-result checkin-ok" id="result-ok">
      <div class="icon">✓</div>
      <h2 style="color:var(--green);" id="result-ok-name"></h2>
      <p id="result-ok-info"></p>
    </div>
    <div class="checkin-result checkin-error" id="result-error">
      <div class="icon">✕</div>
      <h2 style="color:#DC2626;" id="result-error-msg"></h2>
      <p id="result-error-info"></p>
    </div>
  </div>

  <!-- BADGE PRINT ON SITE -->
  <div style="text-align:center;margin:20px 0;">
    <button onclick="printOnSite()" style="padding:10px 24px;border-radius:10px;background:rgba(201,168,76,.15);color:var(--gold);font-weight:700;border:none;cursor:pointer;">Imprimer badge sur place</button>
  </div>

  <!-- REAL-TIME COUNTERS -->
  <h2 style="font-size:1rem;color:var(--text-dim);margin-bottom:12px;">Compteurs temps reel</h2>
  <div class="realtime-counters" id="counters"></div>

  <!-- LOG -->
  <div class="checkin-log">
    <h2 style="font-size:1rem;color:var(--text-dim);margin-bottom:12px;">Historique des check-ins</h2>
    <div id="log-list"></div>
  </div>
</div>

<script src="../js/data.js"></script>
<script src="../js/qrcode.js"></script>
<script>
var ADMIN_PWD='SAUCISSE2026';
function doLogin(){if(document.getElementById('login-pwd').value===ADMIN_PWD){sessionStorage.setItem('congres_admin','1');showAdmin();}else{document.getElementById('login-error').style.display='block';}}
function logout(){sessionStorage.removeItem('congres_admin');location.reload();}
function showAdmin(){document.getElementById('login-overlay').style.display='none';document.getElementById('admin-app').style.display='flex';document.getElementById('admin-content').style.display='block';renderCounters();}
if(sessionStorage.getItem('congres_admin'))showAdmin();

var checkedIn = JSON.parse(localStorage.getItem('congres_checkins') || '[]');
var logs = JSON.parse(localStorage.getItem('congres_checkin_logs') || '[]');
var lastCheckedIn = null;

function checkIn() {
  var code = document.getElementById('manual-code').value.trim().toUpperCase();
  if (!code) return;

  document.getElementById('result-ok').style.display = 'none';
  document.getElementById('result-error').style.display = 'none';

  var ins = CONGRES.loadInscriptions();
  var found = ins.find(function(i) { return i.id.toUpperCase() === code; });

  if (!found) {
    showError('Badge inconnu', 'Le code "' + code + '" ne correspond a aucun participant.');
    addLog(code, 'INCONNU', false);
    return;
  }

  if (checkedIn.indexOf(found.id) !== -1) {
    showError('Deja scanne', found.prenom + ' ' + found.nom + ' a deja ete enregistre(e).');
    addLog(found.id + ' — ' + found.prenom + ' ' + found.nom, 'DOUBLON', false);
    return;
  }

  // Success
  checkedIn.push(found.id);
  localStorage.setItem('congres_checkins', JSON.stringify(checkedIn));
  lastCheckedIn = found;

  var pass = CONGRES.getPass(found.pass);
  document.getElementById('result-ok-name').textContent = found.prenom + ' ' + found.nom;
  document.getElementById('result-ok-info').textContent = (pass ? pass.nom : found.pass) + ' · ' + (found.entreprise || '') + ' · ' + (found.sessions ? found.sessions.length : 0) + ' sessions';
  document.getElementById('result-ok').style.display = 'block';

  addLog(found.id + ' — ' + found.prenom + ' ' + found.nom, 'OK', true);
  document.getElementById('manual-code').value = '';
  renderCounters();
}

function showError(title, info) {
  document.getElementById('result-error-msg').textContent = title;
  document.getElementById('result-error-info').textContent = info;
  document.getElementById('result-error').style.display = 'block';
}

function addLog(label, status, ok) {
  var time = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
  logs.unshift({ time: time, label: label, status: status, ok: ok });
  localStorage.setItem('congres_checkin_logs', JSON.stringify(logs));
  renderLogs();
}

function renderLogs() {
  var html = '';
  logs.slice(0, 20).forEach(function(l) {
    html += '<div class="log-entry' + (l.ok ? '' : ' error') + '">' +
      '<span class="log-time">' + l.time + '</span>' +
      '<span class="log-status ' + (l.ok ? 'ok' : 'err') + '">' + l.status + '</span>' +
      '<span>' + l.label + '</span>' +
    '</div>';
  });
  document.getElementById('log-list').innerHTML = html || '<p style="color:var(--text-muted);font-size:.85rem;">Aucun check-in enregistre.</p>';
}

function renderCounters() {
  var ins = CONGRES.loadInscriptions();
  var total = ins.length;
  var checked = checkedIn.length;
  var passCount = {};
  ins.forEach(function(i) { passCount[i.pass] = (passCount[i.pass] || 0) + 1; });

  var passNames = { standard: 'Standard', bronze: 'Bronze', gold: 'Gold', platinum: 'Platinum', staff: 'Staff' };

  var html = '<div class="counter-card"><div class="counter-val">' + checked + ' / ' + total + '</div><div class="counter-label">Check-ins total</div></div>';
  Object.keys(passNames).forEach(function(key) {
    var total = passCount[key] || 0;
    var checkedPass = 0;
    ins.forEach(function(i) {
      if (i.pass === key && checkedIn.indexOf(i.id) !== -1) checkedPass++;
    });
    html += '<div class="counter-card"><div class="counter-val">' + checkedPass + ' / ' + total + '</div><div class="counter-label">' + passNames[key] + '</div></div>';
  });
  document.getElementById('counters').innerHTML = html;
  renderLogs();
}

function startCamera() {
  var video = document.getElementById('camera-video');
  if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }).then(function(stream) {
      video.srcObject = stream;
      video.style.display = 'block';
    }).catch(function(err) {
      alert('Camera non disponible : ' + err.message + '\n\nUtilisez la saisie manuelle.');
    });
  } else {
    alert('Camera non supportee par ce navigateur. Utilisez la saisie manuelle.');
  }
}

function printOnSite() {
  if (!lastCheckedIn) { alert('Faites d\'abord un check-in pour imprimer le badge.'); return; }
  var badge = generateBadge(lastCheckedIn);
  var w = window.open('', '_blank');
  w.document.write('<html><head><title>Badge</title><style>body{display:flex;justify-content:center;padding:40px;font-family:-apple-system,sans-serif;}@media print{body{padding:0;}}</style></head><body>' + badge + '<script>setTimeout(function(){window.print();},500);<\/script></body></html>');
}
</script>
</body>
</html>
