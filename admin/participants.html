<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Participants — Back Office</title>
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

<div class="login-overlay" id="login-overlay">
  <div class="login-box">
    <h1>🌭 Back Office</h1><p>Entrez le mot de passe</p>
    <input type="password" id="login-pwd" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Connexion</button>
    <div class="login-error" id="login-error">Mot de passe incorrect</div>
  </div>
</div>

<header class="admin-header" id="admin-app" style="display:none;">
  <div class="admin-brand">🌭 Back Office</div>
  <nav class="admin-nav">
    <a href="index.html">Dashboard</a>
    <a href="participants.html" class="active">Participants</a>
    <a href="invitations.html">Invitations</a>
    <a href="traiteur.html">Traiteur</a>
    <a href="salles.html">Salles</a>
    <a href="checkin.html">Check-in</a>
    <a href="emails.html">Emails</a>
  </nav>
  <button class="admin-logout" onclick="logout()">Deconnexion</button>
</header>

<div class="admin-content" id="admin-content" style="display:none;">
  <h1 class="admin-title">Gestion des participants</h1>

  <!-- SEARCH & FILTERS -->
  <div class="search-bar">
    <input type="text" id="search-input" placeholder="Rechercher par nom, email, entreprise..." oninput="renderTable()">
    <select id="filter-pass" onchange="renderTable()">
      <option value="">Tous les passes</option>
      <option value="standard">Standard</option>
      <option value="bronze">VIP Bronze</option>
      <option value="gold">VIP Gold</option>
      <option value="platinum">VIP Platinum</option>
      <option value="staff">Staff</option>
    </select>
    <select id="filter-status" onchange="renderTable()">
      <option value="">Tous statuts</option>
      <option value="confirmed">Confirme</option>
      <option value="pending">En attente</option>
    </select>
    <button onclick="exportCSV()">Export CSV</button>
    <button onclick="printAllBadges()" style="background:rgba(201,168,76,.15);color:var(--gold);">Imprimer badges</button>
  </div>

  <div id="count-info" style="font-size:.82rem;color:var(--text-dim);margin-bottom:12px;"></div>

  <!-- TABLE -->
  <div class="admin-table-wrap">
    <table class="admin-table">
      <thead>
        <tr>
          <th>ID</th><th>Nom</th><th>Email</th><th>Tel</th><th>Entreprise</th>
          <th>Pass</th><th>Sessions</th><th>Repas</th><th>Hotel</th><th>Statut</th><th>Actions</th>
        </tr>
      </thead>
      <tbody id="participants-body"></tbody>
    </table>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detail-modal" style="display:none;">
  <div class="modal" style="background:var(--bg-card);max-width:700px;border:1px solid var(--border);">
    <button class="modal-close" onclick="closeDetail()" style="color:var(--text-muted);">&times;</button>
    <div id="detail-content"></div>
  </div>
</div>

<script src="../js/data.js"></script>
<script src="../js/qrcode.js"></script>
<script>
var ADMIN_PWD = 'SAUCISSE2026';
function doLogin() { if(document.getElementById('login-pwd').value===ADMIN_PWD){sessionStorage.setItem('congres_admin','1');showAdmin();}else{document.getElementById('login-error').style.display='block';}}
function logout() { sessionStorage.removeItem('congres_admin'); location.reload(); }
function showAdmin() { document.getElementById('login-overlay').style.display='none'; document.getElementById('admin-app').style.display='flex'; document.getElementById('admin-content').style.display='block'; renderTable(); }
if(sessionStorage.getItem('congres_admin')) showAdmin();

function getFiltered() {
  var ins = CONGRES.loadInscriptions();
  var search = document.getElementById('search-input').value.toLowerCase();
  var passFilter = document.getElementById('filter-pass').value;
  var statusFilter = document.getElementById('filter-status').value;

  return ins.filter(function(i) {
    if (search && !(i.nom.toLowerCase().includes(search) || i.prenom.toLowerCase().includes(search) || i.email.toLowerCase().includes(search) || (i.entreprise||'').toLowerCase().includes(search))) return false;
    if (passFilter && i.pass !== passFilter) return false;
    if (statusFilter && i.statut !== statusFilter) return false;
    return true;
  });
}

function renderTable() {
  var filtered = getFiltered();
  var tagClasses = { standard:'tag-standard', bronze:'tag-bronze', gold:'tag-gold', platinum:'tag-platinum', staff:'tag-staff' };
  var statusTags = { confirmed:'tag-confirmed', pending:'tag-pending', declined:'tag-declined' };
  var repasNames = { standard:'Standard', veggie:'Vege', halal:'Halal', gluten:'Sans gluten' };

  document.getElementById('count-info').textContent = filtered.length + ' participant(s) trouve(s)';

  var html = '';
  filtered.forEach(function(i) {
    var p = CONGRES.getPass(i.pass);
    var hotel = i.hotel ? CONGRES.getHotel(i.hotel) : null;
    html += '<tr onclick="showDetail(\'' + i.id + '\')" style="cursor:pointer;">' +
      '<td>' + i.id + '</td>' +
      '<td><strong>' + i.prenom + ' ' + i.nom + '</strong></td>' +
      '<td>' + i.email + '</td>' +
      '<td>' + (i.tel || '-') + '</td>' +
      '<td>' + (i.entreprise || '-') + '</td>' +
      '<td><span class="tag ' + (tagClasses[i.pass]||'') + '">' + (p?p.nom:i.pass) + '</span></td>' +
      '<td>' + (i.sessions ? i.sessions.length : 0) + '</td>' +
      '<td>' + (repasNames[i.repas] || '-') + '</td>' +
      '<td>' + (hotel ? hotel.nom : '-') + '</td>' +
      '<td><span class="tag ' + (statusTags[i.statut]||'') + '">' + i.statut + '</span></td>' +
      '<td><button class="btn btn-sm" style="background:var(--gold-dim);color:var(--gold);padding:4px 10px;font-size:.72rem;" onclick="event.stopPropagation();printBadge(\'' + i.id + '\')">Badge</button></td>' +
    '</tr>';
  });
  document.getElementById('participants-body').innerHTML = html;
}

function showDetail(id) {
  var ins = CONGRES.loadInscriptions();
  var i = ins.find(function(x) { return x.id === id; });
  if (!i) return;
  var p = CONGRES.getPass(i.pass);
  var hotel = i.hotel ? CONGRES.getHotel(i.hotel) : null;
  var dayNames = ['','Jeu. 12','Ven. 13','Sam. 14'];

  var html = '<h2 style="color:var(--gold);margin-bottom:16px;">' + i.prenom + ' ' + i.nom + '</h2>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">' +
      '<div><span style="color:var(--text-muted);font-size:.78rem;">Email</span><br>' + i.email + '</div>' +
      '<div><span style="color:var(--text-muted);font-size:.78rem;">Telephone</span><br>' + (i.tel||'-') + '</div>' +
      '<div><span style="color:var(--text-muted);font-size:.78rem;">Entreprise</span><br>' + (i.entreprise||'-') + '</div>' +
      '<div><span style="color:var(--text-muted);font-size:.78rem;">Pass</span><br><span class="tag tag-' + i.pass + '">' + (p?p.nom:i.pass) + '</span></div>' +
      '<div><span style="color:var(--text-muted);font-size:.78rem;">Hotel</span><br>' + (hotel?hotel.nom:'Aucun') + '</div>' +
      '<div><span style="color:var(--text-muted);font-size:.78rem;">Repas</span><br>' + (i.repas||'-') + '</div>' +
      '<div><span style="color:var(--text-muted);font-size:.78rem;">Date inscription</span><br>' + i.date + '</div>' +
      '<div><span style="color:var(--text-muted);font-size:.78rem;">Statut</span><br><span class="tag tag-' + i.statut + '">' + i.statut + '</span></div>' +
    '</div>';

  if (i.sessions && i.sessions.length > 0) {
    html += '<h3 style="color:var(--gold);font-size:.9rem;margin-bottom:8px;">Sessions (' + i.sessions.length + ')</h3>';
    i.sessions.forEach(function(sid) {
      var s = CONGRES.getSession(sid);
      if (s) html += '<div style="padding:4px 0;font-size:.82rem;color:var(--text-dim);">' + dayNames[s.jour] + ' ' + s.debut + ' — ' + s.titre + '</div>';
    });
  }

  html += '<div style="margin-top:20px;text-align:center;">' +
    '<button class="btn btn-sm" style="background:var(--gold);color:#111;" onclick="printBadge(\'' + i.id + '\')">Imprimer le badge</button>' +
  '</div>';

  document.getElementById('detail-content').innerHTML = html;
  document.getElementById('detail-modal').style.display = 'flex';
}

function closeDetail() { document.getElementById('detail-modal').style.display = 'none'; }

function printBadge(id) {
  var ins = CONGRES.loadInscriptions();
  var i = ins.find(function(x) { return x.id === id; });
  if (!i) return;
  var badge = generateBadge(i);
  var w = window.open('', '_blank');
  w.document.write('<html><head><title>Badge ' + i.prenom + ' ' + i.nom + '</title><style>body{display:flex;justify-content:center;padding:40px;font-family:-apple-system,sans-serif;}@media print{body{padding:0;}}</style></head><body>' + badge + '<script>setTimeout(function(){window.print();},500);<\/script></body></html>');
}

function printAllBadges() {
  var filtered = getFiltered();
  var badges = filtered.map(function(i) { return generateBadge(i); }).join('<div style="page-break-after:always;margin:20px 0;"></div>');
  var w = window.open('', '_blank');
  w.document.write('<html><head><title>Badges</title><style>body{font-family:-apple-system,sans-serif;padding:20px;}@media print{body{padding:0;}}</style></head><body>' + badges + '<script>setTimeout(function(){window.print();},500);<\/script></body></html>');
}

function exportCSV() {
  var filtered = getFiltered();
  var csv = 'ID,Prenom,Nom,Email,Telephone,Entreprise,Pass,Sessions,Repas,Hotel,Statut,Date\n';
  filtered.forEach(function(i) {
    var hotel = i.hotel ? CONGRES.getHotel(i.hotel) : null;
    csv += [i.id, i.prenom, i.nom, i.email, i.tel||'', i.entreprise||'', i.pass, (i.sessions||[]).length, i.repas||'', hotel?hotel.nom:'', i.statut, i.date].join(',') + '\n';
  });
  var blob = new Blob([csv], { type: 'text/csv' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'participants_congres_saucisse.csv';
  a.click();
}
</script>
</body>
</html>
