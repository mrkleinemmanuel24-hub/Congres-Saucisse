<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checklist Maitre — Back Office</title>
  <link rel="stylesheet" href="../css/admin.css">
  <style>
    .checklist-progress { background: var(--bg-card); border: 1px solid var(--gold); border-radius: var(--radius); padding: 24px; margin-bottom: 32px; }
    .checklist-progress h2 { color: var(--gold); font-size: 1.1rem; margin-bottom: 12px; }
    .progress-global { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
    .progress-bar-track { flex: 1; height: 20px; background: rgba(255,255,255,.06); border-radius: 10px; overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 10px; transition: width .5s ease; display: flex; align-items: center; justify-content: center; font-size: .75rem; font-weight: 700; color: #111; }
    .progress-pct { font-size: 1.8rem; font-weight: 900; color: var(--gold); min-width: 80px; text-align: right; }
    .section-progress-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
    .section-mini { background: rgba(255,255,255,.02); border-radius: 8px; padding: 10px 12px; }
    .section-mini .mini-label { font-size: .72rem; color: var(--text-dim); margin-bottom: 4px; }
    .section-mini .mini-bar { height: 6px; background: rgba(255,255,255,.06); border-radius: 3px; overflow: hidden; }
    .section-mini .mini-fill { height: 100%; border-radius: 3px; transition: width .5s; }

    .checklist-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; }
    .checklist-section h3 { color: var(--gold); font-size: .95rem; margin-bottom: 4px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
    .checklist-section h3 .toggle-arrow { transition: transform .2s; font-size: .7rem; }
    .checklist-section h3 .toggle-arrow.open { transform: rotate(90deg); }
    .section-subtitle { font-size: .78rem; color: var(--text-dim); margin-bottom: 16px; }
    .section-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: .7rem; font-weight: 700; margin-left: 8px; }

    .checklist-item { display: grid; grid-template-columns: 32px 1fr 120px 140px 90px; gap: 10px; align-items: center; padding: 10px 12px; border-bottom: 1px solid rgba(201,168,76,.05); font-size: .82rem; transition: background .2s; }
    .checklist-item:hover { background: rgba(201,168,76,.03); }
    .checklist-item:last-child { border-bottom: none; }
    .checklist-item input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--green); cursor: pointer; }
    .checklist-item.done .item-label { text-decoration: line-through; color: var(--text-muted); }
    .checklist-item.overdue { background: rgba(220,38,38,.04); }
    .checklist-item .item-label { color: var(--text); }
    .checklist-item .item-date { font-size: .75rem; color: var(--text-dim); }
    .checklist-item .item-date input { background: rgba(255,255,255,.04); border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; color: var(--text); font-size: .75rem; width: 100%; }
    .checklist-item .item-resp { font-size: .75rem; }
    .checklist-item .item-resp input { background: rgba(255,255,255,.04); border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; color: var(--text); font-size: .75rem; width: 100%; }
    .checklist-item .item-status { text-align: center; }
    .status-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: .68rem; font-weight: 700; }
    .status-fait { background: rgba(34,197,94,.15); color: var(--green); }
    .status-encours { background: rgba(245,158,11,.15); color: var(--orange); }
    .status-retard { background: rgba(220,38,38,.15); color: var(--red); }
    .status-avenir { background: rgba(255,255,255,.08); color: var(--text-dim); }

    .overdue-alerts { background: rgba(220,38,38,.06); border: 1px solid rgba(220,38,38,.2); border-radius: var(--radius); padding: 20px; margin-bottom: 24px; display: none; }
    .overdue-alerts h3 { color: var(--red); font-size: .9rem; margin-bottom: 10px; }
    .overdue-alerts .alert-item { font-size: .82rem; padding: 4px 0; color: var(--text-dim); }

    @media (max-width: 768px) {
      .checklist-item { grid-template-columns: 28px 1fr; }
      .checklist-item .item-date, .checklist-item .item-resp, .checklist-item .item-status { display: none; }
    }
  </style>
</head>

var STORAGE_KEY = 'congres_checklist';

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) { return {}; }
}
function saveState(state) { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

function render() {
  var state = loadState();
  var today = new Date().toISOString().split('T')[0];
  var totalItems = 0, doneItems = 0;
  var sectionStats = [];
  var overdueItems = [];

  // Calculate stats
  CHECKLIST_SECTIONS.forEach(function(sec) {
    var secTotal = sec.items.length;
    var secDone = 0;
    sec.items.forEach(function(item) {
      totalItems++;
      var s = state[item.id] || {};
      if (s.checked) { doneItems++; secDone++; }
      else if (item.date < today) {
        overdueItems.push({ label: item.label, date: item.date, section: sec.title });
      }
    });
    sectionStats.push({ title: sec.title, total: secTotal, done: secDone, color: sec.color });
  });

  // Global progress
  var pct = totalItems > 0 ? Math.round((doneItems / totalItems) * 100) : 0;
  var fillColor = pct >= 80 ? 'var(--green)' : pct >= 50 ? 'var(--gold)' : pct >= 25 ? 'var(--orange)' : 'var(--red)';
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-fill').style.background = fillColor;
  document.getElementById('progress-fill').textContent = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';

  // Section mini progress
  var miniHtml = '';
  sectionStats.forEach(function(s) {
    var sp = s.total > 0 ? Math.round((s.done / s.total) * 100) : 0;
    miniHtml += '<div class="section-mini"><div class="mini-label">' + s.title + ' (' + s.done + '/' + s.total + ')</div><div class="mini-bar"><div class="mini-fill" style="width:' + sp + '%;background:' + s.color + ';"></div></div></div>';
  });
  document.getElementById('section-progress').innerHTML = miniHtml;

  // Overdue alerts
  if (overdueItems.length > 0) {
    var alertEl = document.getElementById('overdue-alerts');
    alertEl.style.display = 'block';
    var alertHtml = '';
    overdueItems.forEach(function(o) {
      alertHtml += '<div class="alert-item" style="color:var(--red);">&#9888; <strong>' + o.label + '</strong> — echeance : ' + o.date + ' (' + o.section + ')</div>';
    });
    document.getElementById('overdue-list').innerHTML = alertHtml;
  }

  // Sections
  var containerHtml = '';
  CHECKLIST_SECTIONS.forEach(function(sec, si) {
    var secState = sectionStats[si];
    var secPct = secState.total > 0 ? Math.round((secState.done / secState.total) * 100) : 0;
    var badgeColor = secPct === 100 ? 'var(--green)' : secPct > 0 ? 'var(--orange)' : 'var(--text-muted)';
    var badgeBg = secPct === 100 ? 'rgba(34,197,94,.15)' : secPct > 0 ? 'rgba(245,158,11,.15)' : 'rgba(255,255,255,.08)';

    containerHtml += '<div class="checklist-section">';
    containerHtml += '<h3 onclick="toggleSection(\'' + sec.id + '\')"><span class="toggle-arrow open" id="arrow-' + sec.id + '">&#9654;</span> ' + sec.title + '<span class="section-badge" style="background:' + badgeBg + ';color:' + badgeColor + ';">' + secState.done + '/' + secState.total + '</span></h3>';
    containerHtml += '<div class="section-subtitle">' + sec.subtitle + '</div>';
    containerHtml += '<div id="items-' + sec.id + '">';

    sec.items.forEach(function(item) {
      var s = state[item.id] || {};
      var checked = s.checked ? true : false;
      var resp = s.resp || item.resp || '';
      var date = s.date || item.date || '';
      var isOverdue = !checked && date < today;
      var statusClass = checked ? 'status-fait' : isOverdue ? 'status-retard' : date <= today ? 'status-encours' : 'status-avenir';
      var statusLabel = checked ? 'Fait' : isOverdue ? 'En retard' : date <= today ? 'En cours' : 'A venir';

      containerHtml += '<div class="checklist-item' + (checked ? ' done' : '') + (isOverdue ? ' overdue' : '') + '">';
      containerHtml += '<input type="checkbox" ' + (checked ? 'checked' : '') + ' onchange="toggleItem(\'' + item.id + '\', this.checked)">';
      containerHtml += '<div class="item-label">' + item.label + '</div>';
      containerHtml += '<div class="item-date"><input type="date" value="' + date + '" onchange="updateDate(\'' + item.id + '\', this.value)"></div>';
      containerHtml += '<div class="item-resp"><input type="text" value="' + resp + '" placeholder="Responsable" onchange="updateResp(\'' + item.id + '\', this.value)"></div>';
      containerHtml += '<div class="item-status"><span class="status-tag ' + statusClass + '">' + statusLabel + '</span></div>';
      containerHtml += '</div>';
    });

    containerHtml += '</div></div>';
  });

  document.getElementById('checklist-container').innerHTML = containerHtml;
}

function toggleItem(id, checked) {
  var state = loadState();
  if (!state[id]) state[id] = {};
  state[id].checked = checked;
  saveState(state);
  render();
}

function updateDate(id, date) {
  var state = loadState();
  if (!state[id]) state[id] = {};
  state[id].date = date;
  saveState(state);
}

function updateResp(id, resp) {
  var state = loadState();
  if (!state[id]) state[id] = {};
  state[id].resp = resp;
  saveState(state);
}

function toggleSection(id) {
  var el = document.getElementById('items-' + id);
  var arrow = document.getElementById('arrow-' + id);
  if (el.style.display === 'none') {
    el.style.display = 'block';
    arrow.classList.add('open');
  } else {
    el.style.display = 'none';
    arrow.classList.remove('open');
  }
}

function resetChecklist() {
  if (confirm('Reinitialiser toute la checklist ? Toutes les coches et responsables seront perdus.')) {
    localStorage.removeItem(STORAGE_KEY);
    render();
  }
}
</script>
</body>
</html>
