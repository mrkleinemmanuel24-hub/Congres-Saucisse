<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jauge des salles — Back Office</title>
  <link rel="stylesheet" href="../css/admin.css">
  <style>
    .gauge-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    .gauge-card .session-list { margin-top: 12px; }
    .gauge-card .session-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(201,168,76,.05); font-size: .78rem; }
    .gauge-card .session-item:last-child { border-bottom: none; }
    .alert-banner { background: rgba(220,38,38,.08); border: 1px solid rgba(220,38,38,.2); border-radius: 12px; padding: 16px; margin-bottom: 24px; display: none; }
    .alert-banner.visible { display: block; }
    .alert-banner h3 { color: #DC2626; font-size: .9rem; margin-bottom: 8px; }
    .alert-banner p { font-size: .82rem; color: var(--text-dim); }
  </style>
</head>
<body>

<div class="login-overlay" id="login-overlay">
  <div class="login-box"><h1>🌭 Back Office</h1><p>Entrez le mot de passe</p><input type="password" id="login-pwd" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')doLogin()"><button onclick="doLogin()">Connexion</button><div class="login-error" id="login-error">Mot de passe incorrect</div></div>
</div>

<header class="admin-header" id="admin-app" style="display:none;">
  <div class="admin-brand">🌭 Back Office</div>
  <nav class="admin-nav">
    <a href="index.html">Dashboard</a>
    <a href="participants.html">Participants</a>
    <a href="invitations.html">Invitations</a>
    <a href="traiteur.html">Traiteur</a>
    <a href="salles.html" class="active">Salles</a>
    <a href="checkin.html">Check-in</a>
    <a href="emails.html">Emails</a>
  </nav>
  <button class="admin-logout" onclick="logout()">Deconnexion</button>
</header>

<div class="admin-content" id="admin-content" style="display:none;">
  <h1 class="admin-title">Jauge des salles</h1>

  <!-- ALERT BANNER -->
  <div class="alert-banner" id="alert-banner">
    <h3>⚠️ Alertes de capacite</h3>
    <div id="alert-list"></div>
  </div>

  <!-- STATS -->
  <div class="stats-grid" style="margin-bottom:24px;">
    <div class="stat-card" id="stat-total-cap"></div>
    <div class="stat-card" id="stat-total-ins"></div>
    <div class="stat-card" id="stat-avg-fill"></div>
    <div class="stat-card" id="stat-full"></div>
  </div>

  <!-- GAUGES -->
  <div class="gauge-grid" id="gauge-grid"></div>
</div>

<script src="../js/data.js"></script>
<script>
var ADMIN_PWD='SAUCISSE2026';
function doLogin(){if(document.getElementById('login-pwd').value===ADMIN_PWD){sessionStorage.setItem('congres_admin','1');showAdmin();}else{document.getElementById('login-error').style.display='block';}}
function logout(){sessionStorage.removeItem('congres_admin');location.reload();}
function showAdmin(){document.getElementById('login-overlay').style.display='none';document.getElementById('admin-app').style.display='flex';document.getElementById('admin-content').style.display='block';render();}
if(sessionStorage.getItem('congres_admin'))showAdmin();

function render() {
  var dayNames = ['', 'J1', 'J2', 'J3'];
  var alerts = [];
  var totalCap = 0;
  var totalIns = 0;
  var fullCount = 0;

  var html = '';
  CONGRES.SALLES.forEach(function(salle) {
    var sessions = CONGRES.getSessionsBySalle(salle.id);
    var maxFill = 0;

    var sessionsHtml = '';
    sessions.forEach(function(s) {
      var pct = Math.round((s.inscrits / salle.capacite) * 100);
      maxFill = Math.max(maxFill, pct);
      totalIns += s.inscrits;

      var colorClass = 'green';
      if (pct >= 100) { colorClass = 'black'; fullCount++; }
      else if (pct >= 80) colorClass = 'red';
      else if (pct >= 50) colorClass = 'orange';

      if (pct >= 80) {
        alerts.push({ salle: salle.nom, session: s.titre, jour: s.jour, pct: pct });
      }

      sessionsHtml += '<div class="session-item">' +
        '<span>' + dayNames[s.jour] + ' ' + s.debut + ' — ' + s.titre.substring(0, 35) + (s.titre.length > 35 ? '...' : '') + '</span>' +
        '<span><span class="tag" style="background:rgba(' + (colorClass==='green'?'34,197,94':colorClass==='orange'?'245,158,11':colorClass==='red'?'220,38,38':'51,51,51') + ',.15);color:' + (colorClass==='green'?'#22C55E':colorClass==='orange'?'#F59E0B':colorClass==='red'?'#DC2626':'#999') + ';">' + pct + '% (' + s.inscrits + '/' + salle.capacite + ')</span></span>' +
      '</div>';
    });

    totalCap += salle.capacite * sessions.length;

    // Gauge color based on max fill
    var gaugeColor = 'green';
    if (maxFill >= 100) gaugeColor = 'black';
    else if (maxFill >= 80) gaugeColor = 'red';
    else if (maxFill >= 50) gaugeColor = 'orange';

    html += '<div class="gauge-card">' +
      '<h4>' + salle.nom + '</h4>' +
      '<div class="gauge-info">' + salle.etage + ' · Capacite max : ' + salle.capacite + ' · ' + sessions.length + ' sessions</div>' +
      '<div class="gauge-track"><div class="gauge-fill ' + gaugeColor + '" style="width:' + Math.min(maxFill, 100) + '%;"></div></div>' +
      '<div style="text-align:right;font-size:.75rem;color:var(--text-muted);margin-top:4px;">Remplissage max : ' + maxFill + '%</div>' +
      '<div class="session-list">' + sessionsHtml + '</div>' +
    '</div>';
  });

  document.getElementById('gauge-grid').innerHTML = html;

  // Stats
  var avgFill = totalCap > 0 ? Math.round((totalIns / totalCap) * 100) : 0;
  document.getElementById('stat-total-cap').innerHTML = '<div class="stat-value">' + CONGRES.SALLES.reduce(function(a,s){return a+s.capacite;},0) + '</div><div class="stat-label">Capacite totale</div>';
  document.getElementById('stat-total-ins').innerHTML = '<div class="stat-value">' + totalIns + '</div><div class="stat-label">Inscriptions sessions</div>';
  document.getElementById('stat-avg-fill').innerHTML = '<div class="stat-value">' + avgFill + '%</div><div class="stat-label">Remplissage moyen</div>';
  document.getElementById('stat-full').innerHTML = '<div class="stat-value">' + fullCount + '</div><div class="stat-label">Sessions completes</div>';

  // Alerts
  if (alerts.length > 0) {
    var alertHtml = '';
    alerts.sort(function(a,b) { return b.pct - a.pct; });
    alerts.forEach(function(a) {
      alertHtml += '<p>' + (a.pct >= 100 ? '🔴' : '🟠') + ' <strong>' + a.salle + '</strong> — ' + a.session + ' (J' + a.jour + ') : <strong>' + a.pct + '%</strong></p>';
    });
    document.getElementById('alert-list').innerHTML = alertHtml;
    document.getElementById('alert-banner').classList.add('visible');
  }
}
</script>
</body>
</html>
